name: Scrape FIA F1 Documents

on:
  schedule:
    # Run every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Only scrape a specific year (leave blank for all)"
        required: false
        default: ""
      no_timing:
        description: "Skip event timing-info documents"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build scraper arguments
        id: args
        run: |
          ARGS="--output-dir documents"
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ inputs.year }}"
          fi
          if [ "${{ inputs.no_timing }}" = "true" ]; then
            ARGS="$ARGS --no-timing"
          fi
          echo "value=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run scraper
        id: scrape
        run: uv run python scraper.py ${{ steps.args.outputs.value }}

      - name: Commit and push new documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documents/
          if git diff --cached --quiet; then
            echo "No new documents to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            NEW_COUNT="${{ steps.scrape.outputs.new_documents }}"
            git commit -m "docs: add ${NEW_COUNT:-new} FIA F1 documents [${TIMESTAMP}]"
            git push
          fi